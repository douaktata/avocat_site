spring.application.name=monpremiersite
server.port=8081

# MySQL DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/jurishub
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Jackson - serialize dates as ISO strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
jwt.secret=MyVerySecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong1234567890
jwt.expiration=86400000

# H2 CONSOLE (disabled — using MySQL)
spring.h2.console.enabled=false

# ── Payment / Invoice Settings ─────────────────────────────────────────────
payment.invoice.default-tax-rate=0.19
payment.late-fee.percentage=0.05
payment.late-fee.threshold-days=30
payment.reminder.stage1-days=10
payment.reminder.stage2-days=20
payment.reminder.stage3-days=30
payment.reminder.min-days-between=5
payment.receipt.auto-send=true
payment.currency=TND
# Email Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=douaktata@gmail.com
spring.mail.password=ijtbsivkmyhoxyqb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Sender Info
app.mail.from=douaktata@gmail.com
app.mail.from-name=JurisHub Avocats

# Application Base URL
app.base-url=http://localhost:5173

# ── Ollama / Chat Configuration ────────────────────────────────────────────
ollama.base-url=http://localhost:11434
ollama.model=mistral
ollama.timeout=60000
chat.max-history-messages=20
chat.session-expiry-hours=24
